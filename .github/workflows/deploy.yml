name: Build and Deploy Astro to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build Astro
        run: |
          cd frontend
          npm install
          npm run build

      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to the freshly built folder!
          path: ./frontend/dist 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4